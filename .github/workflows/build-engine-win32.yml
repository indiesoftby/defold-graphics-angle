# Based on Defold's build setup and CI scripts:
# https://github.com/defold/defold/blob/dev/README_SETUP.md
# https://github.com/defold/defold/blob/dev/README_BUILD.md
# https://github.com/defold/defold/blob/dev/.github/workflows/engine-nightly.yml

name: Build Defold Win32

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches:
      - main

env:
  BUILD_BRANCH: ${{ vars.BUILD_BRANCH }}
  RELEASE_TAG: ${{ vars.RELEASE_TAG }}

jobs:
  bld-eng-windows:
    strategy:
      matrix:
        platform: [x86_64-win32, x86-win32]
    runs-on: windows-2022
    steps:
      - name: Checkout Defold
        uses: actions/checkout@v4
        with:
          repository: defold/defold
          ref: ${{env.BUILD_BRANCH}}

      - name: Checkout the patch
        uses: actions/checkout@v4
        with:
          path: patch

      - name: Apply code patch
        shell: bash
        run: |
          git apply patch/angle.patch

      # Patch defold.cmake to dynamically set LIB env var per cmake invocation.
      # Defold's sdk_windows.cmake adds /LIBPATH for MSVC libs but fails to
      # detect Windows SDK lib dirs on GitHub Actions runners. A fixed LIB env
      # var can't work because build_engine builds host tools (x64) and target
      # libs (x86) in the same process. This patch reads WindowsSdkDir/Version
      # (set by ilammy/msvc-dev-cmd) and sets LIB to the correct arch's
      # um/ and ucrt/ dirs based on TARGET_PLATFORM, before project() runs.
      # - name: Patch CMake for Windows SDK detection
      #   shell: bash
      #   run: |
      #     cat >> scripts/cmake/defold.cmake << 'CMAKE_PATCH'

      #     # [CI patch] Set Windows SDK lib paths in LIB env var per target arch.
      #     if(WIN32 AND NOT "$ENV{WindowsSdkDir}" STREQUAL "")
      #         set(_ci_wsdk_arch "x64")
      #         if(DEFINED TARGET_PLATFORM)
      #             if(TARGET_PLATFORM STREQUAL "win32" OR TARGET_PLATFORM MATCHES "(^|-)x86($|-)")
      #                 set(_ci_wsdk_arch "x86")
      #             endif()
      #         endif()
      #         set(_ci_wsdk_dir "$ENV{WindowsSdkDir}")
      #         set(_ci_wsdk_ver "$ENV{WindowsSDKVersion}")
      #         string(REGEX REPLACE "[\\\\/]+$" "" _ci_wsdk_ver "${_ci_wsdk_ver}")
      #         set(_ci_wsdk_um "${_ci_wsdk_dir}Lib/${_ci_wsdk_ver}/um/${_ci_wsdk_arch}")
      #         set(_ci_wsdk_ucrt "${_ci_wsdk_dir}lib/${_ci_wsdk_ver}/ucrt/${_ci_wsdk_arch}")
      #         if(EXISTS "${_ci_wsdk_um}" AND EXISTS "${_ci_wsdk_ucrt}")
      #             set(ENV{LIB} "${_ci_wsdk_um};${_ci_wsdk_ucrt};$ENV{LIB}")
      #             message(STATUS "[CI] Windows SDK LIB set for ${_ci_wsdk_arch}: ${_ci_wsdk_um};${_ci_wsdk_ucrt}")
      #         else()
      #             message(WARNING "[CI] Windows SDK dirs not found: ${_ci_wsdk_um}, ${_ci_wsdk_ucrt}")
      #         endif()
      #     endif()
      #     CMAKE_PATCH

      - name: Copy ANGLE to packages
        shell: bash
        run: |
          cp patch/angle-5fb77159-x86_64-win32.tar.gz packages/
          cp patch/angle-5fb77159-win32.tar.gz packages/

      - name: Install Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: 3.12

      - name: Install Java
        uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9
        with:
          java-version: '25'
          distribution: temurin

      - name: Install CMake
        uses: lukka/get-cmake@v4.1.1

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      # Set up MSVC developer environment (cl.exe, link.exe, rc.exe, INCLUDE, LIB).
      # Use arch: x64 — the host is always x64.
      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Unset LIB/LIBPATH: a fixed-arch LIB breaks cross-compilation because
      # build_engine builds host tools (x64) and target libs (x86) in one run.
      # Instead, we patch defold.cmake below to dynamically set LIB per cmake
      # sub-invocation based on TARGET_PLATFORM, using WindowsSdkDir env var.
      # - name: Unset arch-specific LIB for cross-compilation
      #   shell: bash
      #   run: |
      #     echo "LIB=" >> "$GITHUB_ENV"
      #     echo "LIBPATH=" >> "$GITHUB_ENV"

      - name: Setup build environment
        shell: bash
        run: |
          python -u ./scripts/build.py --platform=${{ matrix.platform }} --save-env-path=env.sh save_env
          sed 's/\r$//' env.sh | grep -E "^export (DYNAMO_HOME|DEFOLD_HOME|PYTHONPATH|JAVA_HOME)=" | sed "s/^export //;s/'//g" >> "$GITHUB_ENV"

      - name: Install packages
        shell: bash
        run: python -u ./scripts/build.py install_ext --platform=${{ matrix.platform }}

      - name: Check SDK
        shell: bash
        run: python -u ./scripts/build.py check_sdk --verbose --platform=${{ matrix.platform }}

      - name: Build engine
        shell: bash
        run: python -u ./scripts/build.py build_engine --platform=${{ matrix.platform }} --skip-builtins --skip-tests --skip-docs -- --skip-build-tests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: defold-${{ matrix.platform }}
          path: |
            tmp/dynamo_home/bin/${{ matrix.platform }}
            tmp/dynamo_home/lib/${{ matrix.platform }}

  package-extension:
    needs: bld-eng-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Download artifact x86_64-win32
        uses: actions/download-artifact@v4
        with:
          name: defold-x86_64-win32
          path: artifacts/defold-x86_64-win32

      - name: Download artifact win32
        uses: actions/download-artifact@v4
        with:
          name: defold-win32
          path: artifacts/defold-win32

      - name: Extract ANGLE libs into extension
        run: |
          mkdir -p extension/graphics_angle/lib
          tar -xzf angle-5fb77159-win32.tar.gz -C extension/graphics_angle ./lib
          mv extension/graphics_angle/lib/win32 extension/graphics_angle/lib/x86-win32
          tar -xzf angle-5fb77159-x86_64-win32.tar.gz -C extension/graphics_angle ./lib

      - name: Copy DLLs to res folders
        shell: bash
        run: |
          mkdir -p extension/graphics_angle/res/x86-win32
          mkdir -p extension/graphics_angle/res/x86_64-win32
          cp extension/graphics_angle/lib/x86-win32/*.dll extension/graphics_angle/res/x86-win32/
          cp extension/graphics_angle/lib/x86_64-win32/*.dll extension/graphics_angle/res/x86_64-win32/

      - name: Prepare extension lib folders and copy libgraphics_opengles.lib
        run: |
          cp artifacts/defold-win32/lib/win32/libgraphics_opengles.lib extension/graphics_angle/lib/x86-win32/
          cp artifacts/defold-x86_64-win32/lib/x86_64-win32/libgraphics_opengles.lib extension/graphics_angle/lib/x86_64-win32/

      - name: Zip extension folder
        shell: bash
        run: |
          zip -r "graphics_angle-defold-${{ env.BUILD_BRANCH }}.zip" "extension"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphics_angle-defold-${{ env.BUILD_BRANCH }}
          path: graphics_angle-defold-${{ env.BUILD_BRANCH }}.zip

      - name: Release extension archive
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: graphics_angle-defold-${{ env.BUILD_BRANCH }}.zip
